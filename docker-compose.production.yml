version: '3.8'

services:
  app:
    image: ghcr.io/ngohuyhoanghcm/360tuongtac-marketing:latest
    container_name: 360tuongtac-app
    networks:
      - dokploy-network
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.production
    labels:
      - "traefik.enable=false"  # Disabled - use dynamic config file instead
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dokploy-network:
    external: true
