name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm manual deployment'
        required: true
        default: ''

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/360tuongtac-marketing

jobs:
  # ==========================================
  # Job 1: Quality Gate — Build Verification
  # ==========================================
  quality-gate:
    name: Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://360tuongtac.com
          NODE_ENV: production

  # ==========================================
  # Job 2: Build & Push Docker Image
  # ==========================================
  build-and-push:
    name: Build & Push Docker Image
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ==========================================
  # Job 3: Deploy to VPS via SSH
  # ==========================================
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            echo "========================================"
            echo "  360TuongTac Deployment Started"
            echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "  Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "========================================"

            # Login to GHCR
            echo "[1/6] Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull latest image
            echo "[2/6] Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container
            echo "[3/6] Stopping old container..."
            docker stop 360tuongtac-app 2>/dev/null || true
            docker rm 360tuongtac-app 2>/dev/null || true

            # Run new container
            echo "[4/6] Starting new container..."
            docker run -d \
              --name 360tuongtac-app \
              --network 360tuongtac-network \
              -p 3001:3000 \
              --env-file /opt/360tuongtac/.env.production \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Wait for container to initialize
            echo "[5/6] Waiting for container to start..."
            sleep 5

            # Health check loop
            echo "[6/6] Running health check..."
            HEALTHY=false
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/ || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
                echo "  ✅ Attempt $i/10: Container is healthy (HTTP $STATUS)"
                HEALTHY=true
                break
              fi
              echo "  ⏳ Attempt $i/10: HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "  ❌ Health check failed"
              echo "  Container logs:"
              docker logs 360tuongtac-app --tail 30
              exit 1
            fi

            # Cleanup old images
            echo ""
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Show final status
            echo ""
            echo "========================================"
            echo "  ✅ Deployment Complete"
            echo "========================================"
            docker ps --filter "name=360tuongtac-app" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  # ==========================================
  # Job 4: External Verification
  # ==========================================
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Test external endpoint
        run: |
          echo "Testing http://14.225.224.130:3001/ ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://14.225.224.130:3001/ || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
              echo "✅ Deployment verified! HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i/6: HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ External verification failed"
          exit 1

      - name: Test additional routes
        run: |
          echo "Testing critical routes..."
          for route in /dich-vu/ /blog/ /bang-gia /lien-he /sitemap.xml /robots.txt; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://14.225.224.130:3001${route}" || echo "000")
            echo "  $route -> HTTP $STATUS"
          done
