name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm manual deployment'
        required: true
        default: ''

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/360tuongtac-marketing

jobs:
  # ==========================================
  # Job 1: Quality Gate — Build Verification
  # ==========================================
  quality-gate:
    name: Lint + TypeCheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://360tuongtac.com
          NODE_ENV: production

  # ==========================================
  # Job 2: Build & Push Docker Image
  # ==========================================
  build-and-push:
    name: Build & Push Docker Image
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }}
            NEXT_ADMIN_PASSWORD_HASH=${{ secrets.NEXT_ADMIN_PASSWORD_HASH }}
            NEXT_ADMIN_2FA_SECRET=${{ secrets.NEXT_ADMIN_2FA_SECRET }}
            NEXT_ADMIN_2FA_BACKUP_CODES=${{ secrets.NEXT_ADMIN_2FA_BACKUP_CODES }}
            NEXT_ADMIN_SESSION_TIMEOUT=${{ secrets.NEXT_ADMIN_SESSION_TIMEOUT }}

  # ==========================================
  # Job 3: Deploy to VPS via SSH
  # ==========================================
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            echo "========================================"
            echo "  360TuongTac Deployment Started"
            echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "  Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "========================================"

            # Login to GHCR
            echo "[1/6] Logging in to GitHub Container Registry..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull latest image
            echo "[2/6] Pulling latest image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container
            echo "[3/7] Stopping old container..."
            docker stop 360tuongtac-app 2>/dev/null || true
            docker rm 360tuongtac-app 2>/dev/null || true

            # SECURITY: Remove any Dokploy-generated Traefik config that could conflict
            echo "[4/7] Cleaning up Dokploy routing config (prevent conflicts)..."
            DOKPLOY_TRAEFIK_DIR="/opt/dokploy/data/traefik/dynamic"
            DOKPLOY_CONFIG="${DOKPLOY_TRAEFIK_DIR}/grow-360tuongtac.yml"
            if [ -f "$DOKPLOY_CONFIG" ]; then
              echo "  ⚠️  Found Dokploy config: $DOKPLOY_CONFIG"
              echo "  🗑️  Removing it to prevent routing conflicts..."
              rm -f "$DOKPLOY_CONFIG"
              echo "  ✅ Dokploy config removed"
            else
              echo "  ✅ No Dokploy config found (good!)"
            fi
            # Also check inside Traefik container volume mount
            docker exec dokploy-proxy rm -f /etc/traefik/dynamic/grow-360tuongtac.yml 2>/dev/null && echo "  ✅ Removed from Traefik container" || echo "  ✅ Not in Traefik container"

            # Run new container (SECURITY: localhost only + Traefik routing)
            echo "[5/7] Starting new container..."
            docker run -d \
              --name 360tuongtac-app \
              --network 360tuongtac-network \
              --network dokploy-network \
              -p 127.0.0.1:3001:3000 \
              --label "traefik.enable=true" \
              --label "traefik.http.routers.360tuongtac.rule=Host(\`grow.360tuongtac.com\`)" \
              --label "traefik.http.routers.360tuongtac.entrypoints=websecure" \
              --label "traefik.http.routers.360tuongtac.tls=true" \
              --label "traefik.http.routers.360tuongtac.tls.certresolver=letsencrypt" \
              --label "traefik.http.services.360tuongtac.loadbalancer.server.port=3000" \
              --env-file /opt/360tuongtac/.env.production \
              -e NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
              -e NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}" \
              -e NEXT_PUBLIC_GTM_ID="${{ secrets.NEXT_PUBLIC_GTM_ID }}" \
              -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              -e TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -e NEXT_ADMIN_PASSWORD_HASH="${{ secrets.NEXT_ADMIN_PASSWORD_HASH }}" \
              -e NEXT_ADMIN_2FA_SECRET="${{ secrets.NEXT_ADMIN_2FA_SECRET }}" \
              -e NEXT_ADMIN_2FA_BACKUP_CODES="${{ secrets.NEXT_ADMIN_2FA_BACKUP_CODES }}" \
              -e NEXT_ADMIN_SESSION_TIMEOUT="${{ secrets.NEXT_ADMIN_SESSION_TIMEOUT }}" \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Wait for container to initialize
            echo "[6/7] Waiting for container to start..."
            sleep 5

            # Health check loop
            echo "[7/7] Running health check..."
            HEALTHY=false
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/ || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
                echo "  ✅ Attempt $i/10: Container is healthy (HTTP $STATUS)"
                HEALTHY=true
                break
              fi
              echo "  ⏳ Attempt $i/10: HTTP $STATUS, waiting 5s..."
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "  ❌ Health check failed"
              echo "  Container logs:"
              docker logs 360tuongtac-app --tail 30
              exit 1
            fi

            # Cleanup old images
            echo ""
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Verify Traefik routing (ensure only Docker-based route exists)
            echo ""
            echo "🔍 Verifying Traefik routing configuration..."
            ROUTE_COUNT=$(docker exec dokploy-proxy wget -qO- http://localhost:8080/api/http/routers 2>/dev/null | grep -o '360tuongtac' | wc -l)
            DOKPLOY_ROUTE=$(docker exec dokploy-proxy wget -qO- http://localhost:8080/api/http/routers 2>/dev/null | grep -o 'grow-360' | wc -l)
            
            if [ "$DOKPLOY_ROUTE" -gt 0 ]; then
              echo "  ❌ CRITICAL: Dokploy route still exists ($DOKPLOY_ROUTE found)"
              echo "  🗑️  Force removing Dokploy route..."
              docker exec dokploy-proxy rm -f /etc/traefik/dynamic/grow-360tuongtac.yml 2>/dev/null || true
              echo "  ⚠️  Please restart Traefik manually: docker restart dokploy-proxy"
            else
              echo "  ✅ No Dokploy routes found (good!)"
            fi
            
            if [ "$ROUTE_COUNT" -ge 3 ]; then
              echo "  ✅ Docker-based Traefik route is active ($ROUTE_COUNT references)"
            else
              echo "  ⚠️  Unexpected route count: $ROUTE_COUNT"
            fi

            # Show final status
            echo ""
            echo "========================================"
            echo "  ✅ Deployment Complete"
            echo "========================================"
            docker ps --filter "name=360tuongtac-app" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

  # ==========================================
  # Job 4: Internal Verification (localhost only)
  # ==========================================
  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify container is running on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "Verifying container binding..."
            PORTS=$(docker ps --filter 'name=360tuongtac-app' --format '{{.Ports}}')
            echo "Container ports: $PORTS"
            
            # Check if binding is localhost only
            if echo "$PORTS" | grep -q '127.0.0.1:3001'; then
              echo "✅ Container is bound to localhost only (127.0.0.1:3001)"
            elif echo "$PORTS" | grep -q '0.0.0.0:3001'; then
              echo "❌ SECURITY ISSUE: Container is bound to 0.0.0.0 (public)"
              exit 1
            else
              echo "⚠️  Unexpected port binding: $PORTS"
              exit 1
            fi
            
            # Test internal access
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/ || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
              echo "✅ Internal access works! HTTP $STATUS"
            else
              echo "❌ Internal access failed: HTTP $STATUS"
              exit 1
            fi
